name: ASIOD Simulator Verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify-asiod-simulator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run safe simulator
        run: bash scripts/asiod_simulator.sh

      - name: Verify required outputs exist
        run: |
          test -f dist/ASIOD_MASTER_N0.tar.gz
          test -f dist/ASIOD_BROTHER_ACCESS.tar.gz
          test -f dist/ASIOD_MASTER_N0.tar.gz.simulated.gpg
          test -f dist/ASIOD_BROTHER_ACCESS.tar.gz.simulated.gpg
          test -f dist/asiod_simulation_manifest.json

      - name: Verify brother archive restriction
        run: |
          tar -tzf dist/ASIOD_BROTHER_ACCESS.tar.gz | sort
          ! tar -tzf dist/ASIOD_BROTHER_ACCESS.tar.gz | grep -E 'node0|field07|field08|private|key'

      - name: Upload simulator outputs
        uses: actions/upload-artifact@v4
        with:
          name: asiod-simulator-outputs
          path: dist/
